<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>krishna.rocks</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #ffffff;
      color: #111;
    }

    header, footer {
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      color: #555;
    }

    header {
      border-bottom: 1px solid #eee;
    }

    footer {
      border-top: 1px solid #eee;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      white-space: nowrap;
      min-height: 1.5em;
    }

    .highlight {
      color: red;
      font-weight: bold;
    }

    @media (min-width: 768px) {
      h1 {
        font-size: 2.8rem;
      }
    }
  </style>
</head>

<body>

  <header>
    <div>krishna.rocks</div>
    <div>Coming Soon</div>
  </header>

  <main>
    <h1 id="typing"></h1>
  </main>

  <footer>
    <div>© 2026</div>
    <div>Built with ❤️ by Krishna</div>
  </footer>

  <script>
    const text = "Hey welcome to my domain ";
    const domain = "krishna.rocks";
    const speed = 60;

    let i = 0;
    let j = 0;

    document.addEventListener("DOMContentLoaded", () => {
      const target = document.getElementById("typing");

      function typeText() {
        if (i < text.length) {
          target.textContent += text.charAt(i);
          i++;
          setTimeout(typeText, speed);
        } else {
          typeDomain();
        }
      }

      function typeDomain() {
        if (j < domain.length) {
          target.innerHTML += "<span class='highlight'>" + domain.charAt(j) + "</span>";
          j++;
          setTimeout(typeDomain, speed);
        }
      }

      typeText();
    });
  </script>

</body>
</html>
