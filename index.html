<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>krishna.rocks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --ink: #1a1814;
      --mist: #f5f2ec;
      --gold: #c9a96e;
      --stone: #8c8070;
    }

    html, body {
      height: 100%;
      background: var(--mist);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      overflow: hidden;
    }

    /* Subtle grain texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .scene {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    /* Decorative top rule */
    .rule {
      width: 1px;
      height: 80px;
      background: linear-gradient(to bottom, transparent, var(--gold));
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeSlideDown 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
    }

    .eyebrow {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--stone);
      margin-bottom: 1.4rem;
      opacity: 0;
      animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(3.2rem, 8vw, 6rem);
      line-height: 1.05;
      letter-spacing: -0.01em;
      text-align: center;
      color: var(--ink);
      opacity: 0;
      animation: fadeUp 1.1s cubic-bezier(0.16, 1, 0.3, 1) 0.65s forwards;
    }

    h1 em {
      font-style: italic;
      color: var(--gold);
    }

    .sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1.1rem, 2.5vw, 1.45rem);
      color: var(--stone);
      margin-top: 1.2rem;
      letter-spacing: 0.01em;
      opacity: 0;
      animation: fadeUp 1.1s cubic-bezier(0.16, 1, 0.3, 1) 0.85s forwards;
    }

    /* Gold divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 2.8rem;
      opacity: 0;
      animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 1.05s forwards;
    }
    .divider span {
      display: block;
      width: 48px;
      height: 1px;
      background: var(--gold);
    }
    .divider svg {
      width: 10px;
      height: 10px;
      fill: var(--gold);
    }

    .domain {
      margin-top: 2.4rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: lowercase;
      color: var(--stone);
      opacity: 0;
      animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 1.2s forwards;
    }

    /* Bottom rule */
    .rule-bottom {
      width: 1px;
      height: 80px;
      background: linear-gradient(to top, transparent, var(--gold));
      margin-top: 3rem;
      opacity: 0;
      animation: fadeSlideUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeSlideDown {
      from { opacity: 0; transform: scaleY(0); transform-origin: top; }
      to   { opacity: 1; transform: scaleY(1); transform-origin: top; }
    }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: scaleY(0); transform-origin: bottom; }
      to   { opacity: 1; transform: scaleY(1); transform-origin: bottom; }
    }

    /* Corner accents */
    .corner {
      position: fixed;
      width: 36px;
      height: 36px;
      opacity: 0.35;
    }
    .corner--tl { top: 28px; left: 28px; border-top: 1px solid var(--gold); border-left: 1px solid var(--gold); }
    .corner--tr { top: 28px; right: 28px; border-top: 1px solid var(--gold); border-right: 1px solid var(--gold); }
    .corner--bl { bottom: 28px; left: 28px; border-bottom: 1px solid var(--gold); border-left: 1px solid var(--gold); }
    .corner--br { bottom: 28px; right: 28px; border-bottom: 1px solid var(--gold); border-right: 1px solid var(--gold); }
  </style>
</head>
<body>

  <div class="corner corner--tl"></div>
  <div class="corner corner--tr"></div>
  <div class="corner corner--bl"></div>
  <div class="corner corner--br"></div>

  <main class="scene">
    <div class="rule"></div>

    <p class="eyebrow">Welcome to my domain</p>

    <h1>Hey, <em>hello there.</em></h1>

    <p class="sub">You've arrived at something worth remembering.</p>

    <div class="divider">
      <span></span>
      <svg viewBox="0 0 10 10"><polygon points="5,0 10,10 0,10"/></svg>
      <span></span>
    </div>

    <p class="domain">krishna.rocks</p>

    <div class="rule-bottom"></div>
  </main>

</body>
</html>
