<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>krishna.rocks</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      transition: background 0.3s, color 0.3s;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: #ffffff;
      color: #111;
    }

    body.dark {
      background: #111;
      color: #f5f5f5;
    }

    header {
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #eee;
    }

    footer {
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      border-top: 1px solid #eee;
      font-size: 14px;
      color: #555;
    }

    body.dark header,
    body.dark footer {
      border-color: #333;
      color: #aaa;
    }

    /* Logo */
    .logo {
      font-size: 20px;
      font-weight: 600;
    }

    /* Right section */
    .right {
      display: flex;
      align-items: center;
      gap: 18px;
      font-size: 14px;
    }

    .right span {
      display: flex;
      align-items: center;
    }

    /* Google G Icon */
    .gmail {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .gmail svg {
      width: 100%;
      height: 100%;
    }

    /* Google colors */
    .g-blue { fill: #4285F4; }
    .g-red { fill: #EA4335; }
    .g-yellow { fill: #FBBC05; }
    .g-green { fill: #34A853; }

    /* Dark mode → white icon */
    body.dark .gmail path {
      fill: #f5f5f5 !important;
    }

    .gmail:hover {
      opacity: 0.7;
    }

    /* Dark mode toggle */
    .toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      border: none;
      background: none;
      cursor: pointer;
      line-height: 1;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: clamp(1.5rem, 5vw, 2.8rem);
      font-weight: 500;
      line-height: 1.4;
      opacity: 0;
      transform: scale(0.95);
      animation: fadeScale 0.8s ease forwards;
    }

    @keyframes fadeScale {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .highlight {
      color: red;
      font-weight: bold;
    }

    body.dark .highlight {
      color: #ff4d4d;
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">krishna.rocks</div>

    <div class="right">
      <span>Coming Soon</span>

      <!-- Google G Icon (Gmail link) -->
      <a href="mailto:kv787848@gmail.com" class="gmail">
        <svg viewBox="0 0 24 24">
          <path class="g-blue" d="M21.35 11.1h-9.18v2.92h5.26c-.23 1.3-1.4 3.82-5.26 3.82-3.17 0-5.75-2.62-5.75-5.84s2.58-5.84 5.75-5.84c1.8 0 3 .77 3.69 1.44l2.52-2.44C16.77 3.66 14.7 2.7 12.17 2.7 6.9 2.7 2.7 6.9 2.7 12s4.2 9.3 9.47 9.3c5.46 0 9.07-3.83 9.07-9.22 0-.62-.07-1.09-.15-1.58z"/>
          <path class="g-red" d="M5.55 14.02l-2.9 2.26C4.17 18.6 7.92 21.3 12.17 21.3c2.53 0 4.6-.84 6.13-2.28l-2.83-2.19c-.78.53-1.83.85-3.3.85-3.8 0-4.99-2.55-5.23-3.66z"/>
          <path class="g-yellow" d="M3.22 10.58c-.15.45-.24.93-.24 1.42s.09.97.24 1.42l2.9-2.26z"/>
          <path class="g-green" d="M12.17 6.16c1.95 0 3.27.84 4.02 1.55l2.93-2.85C16.75 3.38 14.7 2.7 12.17 2.7 7.92 2.7 4.17 5.4 2.65 9.72l2.9 2.26c.24-1.11 1.43-3.66 6.62-3.66z"/>
        </svg>
      </a>

      <button class="toggle" onclick="toggleMode()">🌙</button>
    </div>
  </header>

  <main>
    <h1 id="typing"></h1>
  </main>

  <footer>
    <div>© 2026</div>
    <div>Made with ❤️ by Krishna</div>
  </footer>

  <script>
    const text = "Hey welcome to my domain ";
    const domain = "krishna.rocks";
    const speed = 60;

    let i = 0;
    let j = 0;

    document.addEventListener("DOMContentLoaded", () => {
      const target = document.getElementById("typing");

      function typeText() {
        if (i < text.length) {
          target.textContent += text.charAt(i);
          i++;
          setTimeout(typeText, speed);
        } else {
          typeDomain();
        }
      }

      function typeDomain() {
        if (j < domain.length) {
          target.innerHTML += "<span class='highlight'>" + domain.charAt(j) + "</span>";
          j++;
          setTimeout(typeDomain, speed);
        }
      }

      typeText();
    });

    function toggleMode() {
      document.body.classList.toggle("dark");
    }
  </script>

</body>
</html>
